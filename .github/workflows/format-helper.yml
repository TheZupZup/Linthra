name: Format helper

on:
  push:
    branches:
      - agent/supporter-cosmetics-foundation

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.27.4
          cache: true

      - name: Format Dart sources
        run: dart format lib test

      - name: Package formatted sources
        run: tar -czf formatted-sources.tar.gz lib test

      - name: Upload formatted sources
        uses: actions/upload-artifact@v4
        with:
          name: formatted-sources
          path: formatted-sources.tar.gz
          retention-days: 1
