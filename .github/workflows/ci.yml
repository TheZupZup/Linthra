name: CI

# Run the Flutter quality checks on every PR and on pushes to main.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  flutter:
    name: Flutter checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Pinned to a 3.27.x (Dart 3.6.x) stable release for reproducible runs.
      # Keep this in sync with the SDK constraint in pubspec.yaml; bumping it
      # may require reformatting with the newer `dart format`.
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.27.4
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: |
          set +e
          dart format --output=none --set-exit-if-changed . 2>&1 | tee fmt.txt
          rc=${PIPESTATUS[0]}
          if [ "$rc" != "0" ]; then
            echo "::error title=format::$(tr '\n' '~' < fmt.txt | cut -c1-1500)"
          fi
          exit "$rc"

      - name: Analyze
        run: |
          set +e
          flutter analyze 2>&1 | tee an.txt
          rc=${PIPESTATUS[0]}
          if [ "$rc" != "0" ]; then
            echo "::error title=analyze::$(tr '\n' '~' < an.txt | cut -c1-1500)"
          fi
          exit "$rc"

      - name: Run tests
        run: flutter test
