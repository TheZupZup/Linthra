name: GitHub Sponsor Simulation APK

# Produces two clearly-labelled test APKs without contacting GitHub Sponsors:
# one locked and one unlocked. These artifacts are never attached to Releases
# and never replace the ordinary/F-Droid-compatible APK.
on:
  workflow_dispatch:
  pull_request:

permissions:
  contents: read

jobs:
  build-simulation:
    name: Build simulated ${{ matrix.state }} APK
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        state:
          - locked
          - unlocked

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.27.4
          cache: true

      - name: Install dependencies
        run: flutter pub get --enforce-lockfile

      - name: Build simulated GitHub Sponsor APK
        run: |
          flutter build apk --debug \
            --dart-define=LINTHRA_DISTRIBUTION=github \
            --dart-define=LINTHRA_GITHUB_SPONSOR_SIMULATION=${{ matrix.state }}

      - name: Verify and stage APK
        run: |
          set -euo pipefail
          source_apk="build/app/outputs/flutter-apk/app-debug.apk"
          staged_apk="dist/linthra-github-sponsor-simulated-${{ matrix.state }}.apk"
          if [ ! -f "$source_apk" ]; then
            echo "::error::Expected debug APK not found at $source_apk."
            exit 1
          fi
          mkdir -p dist
          cp "$source_apk" "$staged_apk"

      - name: Upload simulated APK
        uses: actions/upload-artifact@v4
        with:
          name: linthra-github-sponsor-simulated-${{ matrix.state }}-apk
          path: dist/linthra-github-sponsor-simulated-${{ matrix.state }}.apk
          if-no-files-found: error
