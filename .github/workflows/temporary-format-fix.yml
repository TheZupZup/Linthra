name: Temporary Dart Format Fix

on:
  push:
    branches:
      - agent/fix-custom-palette-distribution

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/fix-custom-palette-distribution

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.27.4
          cache: true

      - name: Format Dart files
        run: dart format lib test

      - name: Commit formatting
        run: |
          if git diff --quiet; then
            echo "No formatting changes needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib test
          git commit -m "style: apply Dart formatting [skip ci]"
          git push origin HEAD:agent/fix-custom-palette-distribution
